spring:
  application:
    name: Task-Service
  jpa:
    hibernate:
      ddl-auto: create
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      group-id: task-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.jobscraper: DEBUG
    org.springframework.kafka: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Application-specific configuration
app:
  kafka:
    topics:
      scrape-requested: scrape.requested
      scrape-completed: scrape.completed
      scrape-failed: scrape.failed
      rank-completed: rank.completed
      rank-failed: rank.failed
  scheduler:
    poll-interval-ms: 60000  # Check for due tasks every minute
    lock-at-most-for: PT5M   # Hold lock for max 5 minutes
    lock-at-least-for: PT1M  # Hold lock for min 1 minute