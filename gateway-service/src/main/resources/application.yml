server:
  port: 8085

spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-public
              uri: ${AUTH_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/auth/signup
                - Path=/auth/login
                - Path=/auth/refresh

            - id: auth-protected
              uri: ${AUTH_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/auth/**
              filters:
                - JwtAuth

            - id: task-service
              uri: ${TASK_SERVICE_URL:http://localhost:8080}
              predicates:
                - Path=/api/v1/tasks/**
              filters:
                - JwtAuth

            - id: ranker-service
              uri: ${RANKER_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/v1/jobs/**
              filters:
                - JwtAuth

jwt:
  secret: ${JWT_SECRET:empty_for_now}

logging:
  level:
    org.springframework.cloud.gateway: DEBUG